<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Carrito — Fashion Peak</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="catalogo.html" class="nav-logo">
    <svg class="nav-logo-icon" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="7" fill="#252b3d"/>
      <rect x="6" y="8" width="3.5" height="20" fill="white"/>
      <rect x="6" y="8" width="11" height="3.5" fill="white"/>
      <rect x="6" y="17.5" width="9" height="3" fill="white"/>
      <rect x="20" y="8" width="3.5" height="20" fill="#E8294A"/>
      <path d="M23.5 8 Q32 8 32 15 Q32 22 23.5 22" stroke="#E8294A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </svg>
    <span class="nav-logo-text">Fashion Peak</span>
  </a>
  <ul class="nav-links">
    <li><a href="catalogo.html">🏷️ Catálogo</a></li>
    <li><a href="carrito.html" class="active">🛒 Carrito <span class="badge" id="nav-cart-badge">0</span></a></li>
    <li id="nav-admin-link" style="display:none;"><a href="admin.html">⚙️ Admin</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page-container">
  <h1 class="page-title" style="margin-bottom:24px;">Mi Carrito</h1>
  <div id="cart-content"><div style="text-align:center;padding:40px;color:var(--gray-400);">Cargando carrito...</div></div>
</div>

<div class="toast" id="toast"></div>
<script src="../js/api.js"></script>
<script>
  let cart = JSON.parse(localStorage.getItem('fp_cart') || '[]');

  (async () => {
    await Auth.init();
    buildNavbar('carrito');
    // Si hay sesión, sincronizar carrito desde BD
    if (Auth.isLoggedIn()) {
      const res = await API.carrito.get();
      if (res.ok && res.data?.length > 0) {
        cart = res.data.map(i => ({
          id: i.producto_id, nombre: i.nombre, precio: Number(i.precio),
          categoria: i.categoria, emoji: i.emoji, stock: i.stock, qty: i.cantidad
        }));
        localStorage.setItem('fp_cart', JSON.stringify(cart));
        buildNavbar();
      }
    }
    renderCart();
  })();

  async function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    const newQty = item.qty + delta;
    if (newQty <= 0) { await removeItem(id); return; }
    if (newQty > item.stock) { showToast('⚠️ Stock máximo alcanzado', 'error'); return; }
    item.qty = newQty;
    if (Auth.isLoggedIn()) await API.carrito.actualizar(id, newQty);
    localStorage.setItem('fp_cart', JSON.stringify(cart));
    buildNavbar(); renderCart();
  }

  async function removeItem(id) {
    cart = cart.filter(i => i.id !== id);
    if (Auth.isLoggedIn()) await API.carrito.quitar(id);
    localStorage.setItem('fp_cart', JSON.stringify(cart));
    buildNavbar(); renderCart();
    showToast('🗑️ Producto eliminado');
  }

  async function clearCart() {
    cart = [];
    if (Auth.isLoggedIn()) await API.carrito.vaciar();
    localStorage.setItem('fp_cart', JSON.stringify(cart));
    buildNavbar(); renderCart();
    showToast('🗑️ Carrito vaciado');
  }

  async function confirmPurchase() {
    if (!Auth.isLoggedIn()) {
      showToast('⚠️ Debes iniciar sesión para comprar', 'error');
      setTimeout(() => window.location.href = 'login.html', 1500);
      return;
    }
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.textContent = 'Procesando...';

    const res = await API.carrito.confirmar();
    if (res.ok) {
      cart = [];
      localStorage.setItem('fp_cart', JSON.stringify(cart));
      localStorage.setItem('fp_last_order', JSON.stringify({ numero: res.numeroPedido, total: res.total }));
      window.location.href = 'exito.html';
    } else {
      btn.disabled = false; btn.textContent = '✅ Confirmar compra';
      showToast('⚠️ ' + (res.mensaje || 'Error al procesar compra'), 'error');
    }
  }

  function renderCart() {
    const c = document.getElementById('cart-content');
    if (cart.length === 0) {
      c.innerHTML = `<div class="empty-state">
        <span class="emoji">🛒</span><h3>Tu carrito está vacío</h3>
        <p>Explora el catálogo y agrega productos</p>
        <a href="catalogo.html" class="btn btn-primary btn-lg" style="margin-top:20px;display:inline-flex;">Ir al catálogo</a>
      </div>`;
      return;
    }
    const subtotal = cart.reduce((s,i) => s + i.precio * i.qty, 0);
    const envio = subtotal >= 200000 ? 0 : 12000;
    const total = subtotal + envio;
    const totalItems = cart.reduce((s,i) => s + i.qty, 0);

    c.innerHTML = `
    <div class="cart-layout">
      <div class="cart-items">
        ${cart.map(item => `
          <div class="cart-item">
            <div class="cart-item-img">${item.emoji}</div>
            <div class="cart-item-info">
              <p class="cart-item-name">${item.nombre}</p>
              <p class="cart-item-cat">${item.categoria}</p>
              <p class="cart-item-price">$${item.precio.toLocaleString('es-CO')} c/u</p>
            </div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
              <span class="qty-value">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            </div>
            <span class="cart-item-total">$${(item.precio*item.qty).toLocaleString('es-CO')}</span>
            <button class="btn btn-danger" onclick="removeItem(${item.id})">🗑</button>
          </div>`).join('')}
      </div>
      <div class="cart-summary">
        <p class="summary-title">Resumen del pedido</p>
        <div class="summary-row"><span class="label">Subtotal (${totalItems} artículos)</span><span class="value">$${subtotal.toLocaleString('es-CO')}</span></div>
        <div class="summary-row"><span class="label">Descuentos</span><span class="value" style="color:var(--success);">$0</span></div>
        <div class="summary-row"><span class="label">Envío</span><span class="value">${envio===0?'<span style="color:var(--success)">¡Gratis!</span>':'$'+envio.toLocaleString('es-CO')}</span></div>
        ${envio>0?`<div style="background:rgba(232,41,74,0.06);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--primary);margin:4px 0;">
          🎁 Faltan $${(200000-subtotal).toLocaleString('es-CO')} para envío gratis</div>`:''}
        <div class="summary-row summary-total" style="margin-top:8px;padding-top:14px;border-top:2px solid var(--gray-200);">
          <span class="label">Total</span><span class="value">$${total.toLocaleString('es-CO')}</span>
        </div>
        <div class="summary-actions">
          <button class="btn btn-primary btn-lg" id="confirm-btn" onclick="confirmPurchase()" style="justify-content:center;">✅ Confirmar compra</button>
          <button class="btn btn-secondary" onclick="clearCart()" style="justify-content:center;">🗑️ Vaciar carrito</button>
          <a href="catalogo.html" class="btn btn-secondary" style="justify-content:center;text-decoration:none;">← Seguir comprando</a>
        </div>
        <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--gray-100);">
          <p style="font-size:10px;color:var(--gray-400);text-align:center;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Métodos de pago</p>
          <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
            <span style="background:var(--gray-100);padding:5px 10px;border-radius:5px;font-size:12px;font-weight:700;color:var(--gray-700);">VISA</span>
            <span style="background:#003087;color:white;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:700;">PayPal</span>
            <span style="background:#FFD700;color:#333;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:700;">Nequi</span>
            <span style="background:var(--gray-100);padding:5px 10px;border-radius:5px;font-size:12px;font-weight:700;color:var(--gray-700);">PSE</span>
            <span style="background:#e8f4f8;color:#0070ba;padding:5px 10px;border-radius:5px;font-size:11px;font-weight:700;">Daviplata</span>
          </div>
        </div>
      </div>
    </div>`;
  }
</script>
</body>
</html>
