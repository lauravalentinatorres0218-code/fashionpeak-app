<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Compra exitosa! — Fashion Peak</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="catalogo.html" class="nav-logo">
    <svg class="nav-logo-icon" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="7" fill="#252b3d"/>
      <rect x="6" y="8" width="3.5" height="20" fill="white"/>
      <rect x="6" y="8" width="11" height="3.5" fill="white"/>
      <rect x="6" y="17.5" width="9" height="3" fill="white"/>
      <rect x="20" y="8" width="3.5" height="20" fill="#E8294A"/>
      <path d="M23.5 8 Q32 8 32 15 Q32 22 23.5 22" stroke="#E8294A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </svg>
    <span class="nav-logo-text">Fashion Peak</span>
  </a>
  <ul class="nav-links">
    <li><a href="catalogo.html">🏷️ Catálogo</a></li>
    <li><a href="carrito.html">🛒 Carrito</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="success-container">
  <div class="success-card">
    <span class="success-icon">✅</span>
    <h1 class="success-title">¡Compra realizada<br>con éxito!</h1>
    <p class="success-text">Gracias por comprar en Fashion Peak.<br>Recibirás una confirmación en tu correo.</p>

    <div style="background:var(--off-white);border-radius:var(--radius);padding:20px;margin-bottom:28px;text-align:left;">
      <p style="font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:12px;">Detalles del pedido</p>
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;">
        <span style="color:var(--gray-500);">N° de orden</span>
        <span style="font-weight:700;color:var(--primary);" id="order-num">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;">
        <span style="color:var(--gray-500);">Total pagado</span>
        <span style="font-weight:700;" id="order-total">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:14px;">
        <span style="color:var(--gray-500);">Tiempo de entrega</span>
        <span style="font-weight:600;">2–4 días hábiles</span>
      </div>
    </div>

    <a href="catalogo.html" class="btn btn-primary btn-lg" style="display:flex;justify-content:center;text-decoration:none;">
      Seguir comprando
    </a>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  (async () => {
    await Auth.init();
    buildNavbar();
    const order = JSON.parse(localStorage.getItem('fp_last_order') || '{}');
    document.getElementById('order-num').textContent   = order.numero || '#FP-' + Math.floor(Math.random()*90000+10000);
    document.getElementById('order-total').textContent = order.total
      ? '$' + Number(order.total).toLocaleString('es-CO')
      : '—';
  })();
</script>
</body>
</html>
