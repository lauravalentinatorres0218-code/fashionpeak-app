<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Fashion Peak</title>
<link rel="stylesheet" href="../css/styles.css">
<style>
  .demo-pills {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px;
  }
  .demo-pill {
    padding: 6px 14px; border-radius: 100px; border: 1px solid var(--gray-200);
    background: var(--off-white); font-size: 11px; font-weight: 500; cursor: pointer;
    color: var(--gray-700); transition: var(--transition); font-family: 'DM Sans', sans-serif;
  }
  .demo-pill:hover { border-color: var(--primary); color: var(--primary); background: rgba(232,41,74,0.04); }
  .input-error { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(232,41,74,0.12) !important; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-bg-grid"></div>
  <div class="login-bg-glow"></div>

  <div class="login-card">
    <!-- Logo FP -->
    <div class="login-logo">
      <svg class="login-logo-icon" viewBox="0 0 52 52" fill="none">
        <rect width="52" height="52" rx="10" fill="#1a1f2e"/>
        <rect x="9"  y="11" width="4.5" height="30" fill="white"/>
        <rect x="9"  y="11" width="16"  height="4.5" fill="white"/>
        <rect x="9"  y="23" width="13"  height="4"   fill="white"/>
        <rect x="28" y="11" width="4.5" height="30"  fill="#E8294A"/>
        <path d="M32.5 11 Q44 11 44 20.5 Q44 30 32.5 30" stroke="#E8294A" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="login-logo-name">Fashion Peak</span>
    </div>

    <h1 class="login-title">Iniciar sesión</h1>
    <p class="login-subtitle">¡Hola! Qué gusto verte de nuevo.</p>

    <div id="alert" style="display:none; padding:11px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; border-left:3px solid; line-height:1.4;"></div>

    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com"
             oninput="clearAlert()" onkeydown="if(event.key==='Enter') handleLogin()">
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="password-field">
        <input type="password" id="password" class="form-control" placeholder="••••••••"
               oninput="clearAlert()" onkeydown="if(event.key==='Enter') handleLogin()">
        <button class="password-toggle" onclick="togglePwd(this)" type="button">👁</button>
      </div>
    </div>

    <button class="btn btn-primary btn-lg" id="login-btn"
            style="width:100%; justify-content:center; margin-bottom:14px;"
            onclick="handleLogin()">
      Ingresar
    </button>

    <div style="text-align:center;">
      <a href="catalogo.html" style="color:var(--gray-500); text-decoration:none; font-size:13px;">
        Ver catálogo sin iniciar sesión →
      </a>
    </div>

    <div style="margin-top:22px; padding-top:18px; border-top:1px solid var(--gray-100);">
      <p style="font-size:10px; color:var(--gray-400); text-align:center; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;">
        Accesos rápidos de prueba
      </p>
      <div class="demo-pills">
        <button class="demo-pill" onclick="fill('admin@fashionpeak.com','admin123')">⚙️ Administrador</button>
        <button class="demo-pill" onclick="fill('carlos@gmail.com','carlos123')">🛍️ Carlos</button>
        <button class="demo-pill" onclick="fill('laura@gmail.com','laura123')">👗 Laura</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  // Redirigir si ya hay sesión
  (async () => {
    const user = await Auth.init();
    if (user) window.location.href = 'catalogo.html';
  })();

  function togglePwd(btn) {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function fill(email, pass) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = pass;
    clearAlert();
  }

  function clearAlert() {
    document.getElementById('alert').style.display = 'none';
    document.getElementById('email').classList.remove('input-error');
    document.getElementById('password').classList.remove('input-error');
  }

  function showAlert(msg, isError = true) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.style.display = 'block';
    if (isError) {
      el.style.background = 'rgba(232,41,74,0.07)';
      el.style.color = 'var(--primary)';
      el.style.borderColor = 'var(--primary)';
    } else {
      el.style.background = 'rgba(34,197,94,0.07)';
      el.style.color = '#16a34a';
      el.style.borderColor = '#16a34a';
    }
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');

    if (!email || !password) {
      showAlert('Por favor completa todos los campos.');
      if (!email) document.getElementById('email').classList.add('input-error');
      if (!password) document.getElementById('password').classList.add('input-error');
      return;
    }

    // Loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Ingresando...';

    const res = await API.auth.login(email, password);

    btn.disabled = false;
    btn.innerHTML = 'Ingresar';

    if (res.ok) {
      Auth.user = res.data;
      localStorage.setItem('fp_user', JSON.stringify(res.data));
      showAlert('✅ Bienvenido, ' + res.data.nombre, false);
      setTimeout(() => window.location.href = 'catalogo.html', 700);
    } else {
      showAlert(res.mensaje || 'Correo o contraseña incorrectos.');
      document.getElementById('password').classList.add('input-error');
    }
  }
</script>
</body>
</html>
